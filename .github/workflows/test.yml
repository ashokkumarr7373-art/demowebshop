name: Playwright Tests with Allure

on:
  push:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
    # 1. Checkout Code
    - name: Checkout Code
      uses: actions/checkout@v4

    # 2. Python setup
    - name: Setup Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    # 3. Install dependencies
    - name: Install Dependencies
      run: |
        python -m pip install --upgrade pip
        pip install pytest playwright allure-pytest pytest-playwright

    # 4. Install Playwright browsers
    - name: Install Playwright Browsers
      run: playwright install --with-deps chromium

    # 5. Run tests
    - name: Run Tests with Allure
      run: |
        rm -rf allure-results
        mkdir -p allure-results
        python -m pytest test/ -s -v --alluredir=allure-results
      continue-on-error: true

    # 6. Install Java (needed for Allure CLI)
    - name: Setup Java
      uses: actions/setup-java@v4
      with:
        distribution: 'temurin'
        java-version: '17'

    # 7. Install Allure CLI
    - name: Install Allure CLI
      run: |
        wget -q https://github.com/allure-framework/allure2/releases/download/2.30.0/allure-2.30.0.tgz
        tar -zxf allure-2.30.0.tgz
        sudo mv allure-2.30.0 /opt/allure
        sudo ln -sf /opt/allure/bin/allure /usr/bin/allure
        allure --version

    # 8. Load history from gh-pages branch
    - name: Load Allure History
      uses: actions/checkout@v4
      if: always()
      continue-on-error: true
      with:
        ref: gh-pages
        path: gh-pages

    # 9. Copy history into allure-results so trend charts work
    - name: Copy History to Results
      if: always()
      run: |
        if [ -d "gh-pages/history" ]; then
          echo "History found, copying..."
          cp -r gh-pages/history allure-results/history
        else
          echo "No previous history found, skipping..."
        fi

    # 10. Generate Allure Report
    - name: Generate Allure Report
      if: always()
      run: |
        allure generate allure-results -o allure-report --clean
        echo "=== Report generated ==="
        ls allure-report/

    # 11. Deploy to GitHub Pages
    - name: Deploy to GitHub Pages
      uses: peaceiris/actions-gh-pages@v4
      if: always()
      with:
        github_token: ${{ secrets.GITHUB_TOKEN }}
        publish_branch: gh-pages
        publish_dir: allure-report
        force_orphan: false

    # 12. Upload as artifact backup
    - name: Upload Allure Report Artifact
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: allure-report
        path: allure-report/
        retention-days: 7