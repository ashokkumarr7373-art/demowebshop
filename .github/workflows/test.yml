name: Playwright Tests with Allure

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
    # ✅ Checkout code
    - name: Checkout Code
      uses: actions/checkout@v4

    # ✅ Setup Python
    - name: Setup Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    # ✅ Install dependencies
    - name: Install Dependencies
      run: |
        pip install pytest playwright allure-pytest

    # ✅ Install browsers
    - name: Install Playwright Browsers
      run: |
        playwright install --with-deps

    # ✅ Run tests + generate allure results
    - name: Run Tests with Allure
      run: |
        pytest --alluredir=./allure-results

    # ✅ Debug step (VERY IMPORTANT)
    - name: Debug Allure Results
      run: |
        echo "Listing project structure"
        ls -R
        echo "Checking allure-results folder"
        ls -R allure-results || echo "allure-results folder not found"

    # ✅ Install Allure CLI properly
    - name: Install Allure CLI
      run: |
        wget https://github.com/allure-framework/allure2/releases/download/2.27.0/allure-2.27.0.tgz
        tar -zxvf allure-2.27.0.tgz
        sudo mv allure-2.27.0 /opt/allure
        sudo ln -s /opt/allure/bin/allure /usr/bin/allure

    # ✅ Verify installation
    - name: Verify Allure Installation
      run: |
        allure --version

    # ✅ Generate report
    - name: Generate Allure Report
      run: |
        allure generate ./allure-results -o ./allure-report --clean

    # ✅ Upload report
    - name: Upload Allure Report
      uses: actions/upload-artifact@v4
      with:
        name: allure-report
        path: allure-report