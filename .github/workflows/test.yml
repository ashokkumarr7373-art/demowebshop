name: Playwright Tests with Allure

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
    # 1. Checkout
    - name: Checkout Code
      uses: actions/checkout@v4

    # 2. Python setup
    - name: Setup Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    # 3. Install deps
    - name: Install Dependencies
      run: |
        python -m pip install --upgrade pip
        pip install pytest playwright allure-pytest

    # 4. Install browsers
    - name: Install Playwright Browsers
      run: |
        playwright install --with-deps

    # 5. Run tests + FORCE Allure results
    - name: Run Tests with Allure
      run: |
        rm -rf allure-results
        mkdir allure-results
        python -m pytest test/ -s -v --alluredir=allure-results

    # 6. DEBUG (CRITICAL)
    - name: Validate Allure Output
      run: |
        echo "Current directory:"
        pwd
        echo "Allure files:"
        find allure-results -type f || echo "NO FILES FOUND"

    # 7. Install Allure CLI
    - name: Install Allure CLI
      run: |
        wget https://github.com/allure-framework/allure2/releases/download/2.27.0/allure-2.27.0.tgz
        tar -zxvf allure-2.27.0.tgz
        sudo mv allure-2.27.0 /opt/allure
        sudo ln -s /opt/allure/bin/allure /usr/bin/allure

    # 8. Verify Allure
    - name: Verify Allure Installation
      run: |
        allure --version

    # 9. Generate report
    - name: Generate Allure Report
      run: |
        allure generate allure-results -o allure-report --clean

    # 10. Upload report
    - name: Upload Allure Report
      uses: actions/upload-artifact@v4
      with:
        name: allure-report
        path: allure-report