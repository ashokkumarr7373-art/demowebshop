name: Playwright Tests with Allure

on:
  push:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
    # 1. Checkout
    - name: Checkout Code
      uses: actions/checkout@v4

    # 2. Python setup
    - name: Setup Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    # 3. Install dependencies
    - name: Install Dependencies
      run: |
        python -m pip install --upgrade pip
        pip install pytest playwright allure-pytest pytest-playwright

    # 4. Install Playwright browsers
    - name: Install Playwright Browsers
      run: playwright install --with-deps chromium

    # 5. Run tests
    - name: Run Tests with Allure
      run: |
        rm -rf allure-results allure-report
        mkdir -p allure-results
        python -m pytest test/ -s -v --alluredir=allure-results
      continue-on-error: true

    # 6. Validate results generated
    - name: Validate Allure Results
      run: |
        echo "=== Allure result files ==="
        find allure-results -type f | sort || echo "NO FILES FOUND"
        echo "=== Total file count ==="
        find allure-results -type f | wc -l

    # 7. Install Allure CLI
    - name: Install Allure CLI
      run: |
        wget -q https://github.com/allure-framework/allure2/releases/download/2.27.0/allure-2.27.0.tgz
        tar -zxf allure-2.27.0.tgz
        sudo mv allure-2.27.0 /opt/allure
        sudo ln -sf /opt/allure/bin/allure /usr/bin/allure
        allure --version

    # 8. Generate Allure HTML report
    - name: Generate Allure Report
      run: |
        allure generate allure-results -o allure-report --clean
        echo "=== Report files ==="
        find allure-report -type f | head -20

    # 9. Upload as artifact (downloadable from Actions tab)
    - name: Upload Allure Report Artifact
      uses: actions/upload-artifact@v4
      with:
        name: allure-report
        path: allure-report/
        retention-days: 7

    # 10. Deploy to GitHub Pages (viewable as live URL)
    - name: Deploy to GitHub Pages
      uses: peaceiris/actions-gh-pages@v4
      with:
        github_token: ${{ secrets.GITHUB_TOKEN }}
        publish_dir: ./allure-report
        publish_branch: gh-pages
        force_orphan: true