name: Playwright Tests with Allure

on:
  push:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
    # 1. Checkout main code
    - name: Checkout Code
      uses: actions/checkout@v4

    # 2. Python setup
    - name: Setup Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    # 3. Install dependencies
    - name: Install Dependencies
      run: |
        python -m pip install --upgrade pip
        pip install pytest playwright allure-pytest pytest-playwright

    # 4. Install Playwright browsers
    - name: Install Playwright Browsers
      run: playwright install --with-deps chromium

    # 5. Run tests — continue even if tests fail so report still generates
    - name: Run Tests with Allure
      run: |
        rm -rf allure-results
        mkdir -p allure-results
        python -m pytest test/ -s -v --alluredir=allure-results
      continue-on-error: true

    # 6. Load previous report history from gh-pages (for trend charts)
    - name: Get Allure History
      uses: actions/checkout@v4
      if: always()
      continue-on-error: true
      with:
        ref: gh-pages
        path: gh-pages

    # 7. Build Allure report with history — THIS is the key fix
    - name: Build Allure Report
      uses: simple-elf/allure-report-action@v1.9
      if: always()
      with:
        allure_results: allure-results
        gh_pages: gh-pages
        allure_report: allure-report
        allure_history: allure-history

    # 8. Publish to GitHub Pages
    - name: Publish Allure Report to GitHub Pages
      uses: peaceiris/actions-gh-pages@v4
      if: always()
      with:
        github_token: ${{ secrets.GITHUB_TOKEN }}
        publish_branch: gh-pages
        publish_dir: allure-history
        force_orphan: false

    # 9. Also upload as downloadable artifact
    - name: Upload Allure Report Artifact
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: allure-report
        path: allure-report/
        retention-days: 7