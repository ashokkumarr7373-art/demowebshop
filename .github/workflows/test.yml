name: Playwright Tests with Allure

on:
  push:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
    # 1. Checkout Code
    - name: Checkout Code
      uses: actions/checkout@v4

    # 2. Python setup
    - name: Setup Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    # 3. Install dependencies
    - name: Install Dependencies
      run: |
        python -m pip install --upgrade pip
        pip install pytest playwright allure-pytest pytest-playwright

    # 4. Install Playwright browsers
    - name: Install Playwright Browsers
      run: playwright install --with-deps chromium

    # 5. Run tests with full debug output
    - name: Run Tests with Allure
      run: |
        rm -rf allure-results
        mkdir -p allure-results

        echo "========================================"
        echo "REPO STRUCTURE - ALL PYTHON FILES"
        echo "========================================"
        find . -type f -name "*.py" | grep -v __pycache__ | sort

        echo "========================================"
        echo "LOOKING FOR TEST FOLDER"
        echo "========================================"
        ls -lah

        echo "========================================"
        echo "RUNNING PYTEST"
        echo "========================================"
        python -m pytest . -s -v --alluredir=allure-results --ignore=.github || true

        echo "========================================"
        echo "ALLURE RESULTS AFTER RUN"
        echo "========================================"
        find allure-results -type f | sort || echo "NO RESULT FILES FOUND"

        echo "========================================"
        echo "TOTAL RESULT FILES"
        echo "========================================"
        find allure-results -type f | wc -l
      continue-on-error: true

    # 6. Setup Java for Allure CLI
    - name: Setup Java
      uses: actions/setup-java@v4
      if: always()
      with:
        distribution: 'temurin'
        java-version: '17'

    # 7. Install Allure CLI
    - name: Install Allure CLI
      if: always()
      run: |
        wget -q https://github.com/allure-framework/allure2/releases/download/2.30.0/allure-2.30.0.tgz
        tar -zxf allure-2.30.0.tgz
        sudo mv allure-2.30.0 /opt/allure
        sudo ln -sf /opt/allure/bin/allure /usr/bin/allure
        allure --version

    # 8. Load previous history from gh-pages
    - name: Load Allure History
      uses: actions/checkout@v4
      if: always()
      continue-on-error: true
      with:
        ref: gh-pages
        path: gh-pages

    # 9. Copy history so trend charts work
    - name: Copy History to Results
      if: always()
      run: |
        if [ -d "gh-pages/history" ]; then
          echo "✅ History found, copying..."
          cp -r gh-pages/history allure-results/history
        else
          echo "⚠️ No previous history found, first run"
        fi

    # 10. Generate Allure Report
    - name: Generate Allure Report
      if: always()
      run: |
        echo "========================================"
        echo "GENERATING ALLURE REPORT"
        echo "========================================"
        allure generate allure-results -o allure-report --clean

        echo "========================================"
        echo "REPORT FILES GENERATED"
        echo "========================================"
        find allure-report -type f | sort

        echo "========================================"
        echo "DATA FOLDER CHECK"
        echo "========================================"
        ls -lah allure-report/data/ || echo "❌ No data folder found"

        echo "========================================"
        echo "INDEX.HTML CHECK"
        echo "========================================"
        ls -lah allure-report/index.html || echo "❌ index.html missing"

    # 11. Deploy to GitHub Pages
    - name: Deploy to GitHub Pages
      uses: peaceiris/actions-gh-pages@v4
      if: always()
      with:
        github_token: ${{ secrets.GITHUB_TOKEN }}
        publish_branch: gh-pages
        publish_dir: allure-report
        force_orphan: false

    # 12. Upload as downloadable artifact
    - name: Upload Allure Report Artifact
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: allure-report
        path: allure-report/
        retention-days: 7