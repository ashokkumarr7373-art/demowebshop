name: Playwright Tests with Allure

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
    # ✅ Checkout code
    - name: Checkout Code
      uses: actions/checkout@v4

    # ✅ Setup Python
    - name: Setup Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    # ✅ Install dependencies
    - name: Install Dependencies
      run: |
        pip install pytest playwright allure-pytest

    # ✅ Install Playwright browsers
    - name: Install Playwright Browsers
      run: |
        playwright install --with-deps

    # ✅ Run tests with Allure (IMPORTANT FIX)
    - name: Run Tests with Allure
      run: |
        mkdir -p allure-results
        pytest test/ -s -v --alluredir=$(pwd)/allure-results

    # ✅ Add environment info (helps Allure UI)
    - name: Add Allure Environment Info
      run: |
        echo "Browser=Chromium" >> allure-results/environment.properties
        echo "Env=CI" >> allure-results/environment.properties

    # ✅ Debug: check if results are generated
    - name: Check Allure Results Files
      run: |
        echo "Current directory:"
        pwd
        echo "Allure results content:"
        ls -la $(pwd)/allure-results

    # ✅ Install Allure CLI (correct way)
    - name: Install Allure CLI
      run: |
        wget https://github.com/allure-framework/allure2/releases/download/2.27.0/allure-2.27.0.tgz
        tar -zxvf allure-2.27.0.tgz
        sudo mv allure-2.27.0 /opt/allure
        sudo ln -s /opt/allure/bin/allure /usr/bin/allure

    # ✅ Verify installation
    - name: Verify Allure Installation
      run: |
        allure --version

    # ✅ Generate Allure report (IMPORTANT FIX)
    - name: Generate Allure Report
      run: |
        allure generate $(pwd)/allure-results -o $(pwd)/allure-report --clean

    # ✅ Upload report
    - name: Upload Allure Report
      uses: actions/upload-artifact@v4
      with:
        name: allure-report
        path: allure-report